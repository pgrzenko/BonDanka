<!-- BonDanka Reference UI — bondanka_wizard.html -->
<!-- This file is the original reference for the wizard UI and calculation logic -->
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary)}
.wrap{max-width:560px;margin:0 auto;padding:1.5rem 1rem}
.step{display:none}.step.active{display:block}
.step-label{font-size:12px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem}
.step h2{font-size:22px;font-weight:500;margin-bottom:1.5rem;line-height:1.3}
.slider-wrap{margin:1.5rem 0}
.slider-val{font-size:36px;font-weight:500;color:var(--color-text-primary);margin-bottom:.75rem}
.slider-val span{font-size:18px;font-weight:400;color:var(--color-text-secondary)}
input[type=range]{width:100%}
.hint{font-size:13px;color:var(--color-text-secondary);margin-top:.5rem;line-height:1.5}
.amount-wrap{margin:1.5rem 0}
.amount-input{font-size:24px;font-weight:500;width:100%;padding:.5rem 0;border:none;border-bottom:2px solid var(--color-border-primary);background:transparent;color:var(--color-text-primary);outline:none}
.amount-input:focus{border-bottom-color:var(--color-text-info)}
.btn-row{display:flex;gap:12px;margin-top:2rem}
button{padding:.6rem 1.25rem;border-radius:var(--border-radius-md);font-size:15px;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--color-text-primary);color:var(--color-background-primary);border:none;flex:1}
.btn-primary:hover{opacity:.85}
.btn-back{background:transparent;color:var(--color-text-secondary);border:0.5px solid var(--color-border-secondary)}
.btn-back:hover{background:var(--color-background-secondary)}
.rec-box{border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem}
.rec-coi{background:var(--color-background-info);border:0.5px solid var(--color-border-info)}
.rec-edo{background:var(--color-background-success);border:0.5px solid var(--color-border-success)}
.rec-label{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem}
.rec-title{font-size:22px;font-weight:500;margin-bottom:.5rem}
.rec-reason{font-size:14px;line-height:1.6;color:var(--color-text-secondary)}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:1rem 0}
.comp-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:1rem}
.comp-name{font-size:12px;color:var(--color-text-secondary);margin-bottom:.25rem}
.comp-val{font-size:18px;font-weight:500}
.comp-profit{font-size:13px;color:var(--color-text-secondary);margin-top:.2rem}
.comp-winner{border:2px solid var(--color-border-info)}
.warn-box{background:var(--color-background-warning);border:0.5px solid var(--color-border-warning);border-radius:var(--border-radius-md);padding:1rem;margin-top:1rem;font-size:13px;color:var(--color-text-warning);line-height:1.5}
.chart-wrap{margin:1rem 0;position:relative;height:180px}
.progress{display:flex;gap:6px;margin-bottom:1.5rem}
.prog-dot{width:8px;height:8px;border-radius:50%;background:var(--color-border-secondary)}
.prog-dot.done{background:var(--color-text-primary)}
</style>
